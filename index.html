<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>Помощник водителя трамвая</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* ============================================================
           CSS ПЕРЕМЕННЫЕ И ТЕМЫ
           ============================================================ */
        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1a2742;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0b8;
            --text-muted: #6c6c80;
            --accent: #4fc3f7;
            --accent-dark: #0288d1;
            --accent-glow: rgba(79, 195, 247, 0.15);
            --success: #66bb6a;
            --warning: #ffa726;
            --danger: #ef5350;
            --border: #2a2a4a;
            --shadow: 0 4px 20px rgba(0,0,0,0.3);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================================
           БАЗОВЫЕ СТИЛИ
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* ============================================================
           ШАПКА
           ============================================================ */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .header-subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--accent);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: var(--transition);
            display: none;
        }

        .back-btn:active {
            background: var(--accent-glow);
        }

        .back-btn.visible {
            display: block;
        }

        /* ============================================================
           КОНТЕНТ
           ============================================================ */
        .content {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ============================================================
           ЭКРАН ПРИВЕТСТВИЯ
           ============================================================ */
        .greeting-card {
            background: linear-gradient(135deg, #1a2742, #16213e);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .greeting-card .emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .greeting-card h2 {
            font-size: 20px;
            margin-bottom: 6px;
            color: var(--text-primary);
        }

        .greeting-card p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* ============================================================
           КНОПКИ МЕНЮ
           ============================================================ */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .menu-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            width: 100%;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
        }

        .menu-btn:active {
            transform: scale(0.97);
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        .menu-btn .icon {
            font-size: 28px;
            min-width: 40px;
            text-align: center;
        }

        .menu-btn .label {
            flex: 1;
        }

        .menu-btn .label small {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 2px;
        }

        .menu-btn .arrow {
            color: var(--text-muted);
            font-size: 18px;
        }

        /* ============================================================
           ПОИСК
           ============================================================ */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 48px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--text-muted);
        }

        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-secondary);
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 50%;
            display: none;
        }

        .search-clear.visible {
            display: block;
        }

        /* ============================================================
           РЕЗУЛЬТАТЫ
           ============================================================ */
        .results-count {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }

        .result-card:active {
            border-color: var(--accent);
            transform: scale(0.98);
        }

        .result-header {
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .result-cat {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 3px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .cat-fuse { background: rgba(255, 167, 38, 0.15); color: var(--warning); }
        .cat-problem { background: rgba(239, 83, 80, 0.15); color: var(--danger); }
        .cat-instruction { background: rgba(102, 187, 106, 0.15); color: var(--success); }
        .cat-t811 { background: rgba(79, 195, 247, 0.15); color: var(--accent); }

        .result-question {
            font-size: 14px;
            font-weight: 500;
            flex: 1;
        }

        /* ============================================================
           КАРТОЧКА ОТВЕТА
           ============================================================ */
        .answer-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
        }

        .answer-card h3 {
            font-size: 16px;
            margin-bottom: 16px;
            color: var(--accent);
            line-height: 1.4;
        }

        .answer-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-primary);
            white-space: pre-line;
        }

        .answer-text b, .answer-text strong {
            color: var(--accent);
            font-weight: 600;
        }

        /* ============================================================
           СПИСОК ПРЕДОХРАНИТЕЛЕЙ
           ============================================================ */
        .fuse-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .fuse-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fuse-item:active {
            border-color: var(--warning);
            background: var(--bg-card-hover);
        }

        .fuse-num {
            background: rgba(255, 167, 38, 0.15);
            color: var(--warning);
            font-weight: 700;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 8px;
            min-width: 55px;
            text-align: center;
        }

        .fuse-desc {
            font-size: 14px;
            color: var(--text-secondary);
            flex: 1;
        }

        /* ============================================================
           ИНСТРУКЦИИ
           ============================================================ */
        .instruction-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
        }

        .instruction-content h3 {
            color: var(--accent);
            font-size: 16px;
            margin-bottom: 16px;
        }

        .instruction-content p,
        .instruction-content li {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .instruction-content ul {
            padding-left: 20px;
        }

        .instruction-content li {
            margin-bottom: 8px;
        }

        .checklist-section {
            margin-bottom: 20px;
        }

        .checklist-section h4 {
            color: var(--warning);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .checklist-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .checklist-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
            transition: var(--transition);
        }

        .checklist-checkbox.checked {
            background: var(--success);
            border-color: var(--success);
        }

        .checklist-checkbox.checked::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: 700;
        }

        .checklist-item.checked-item .checklist-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .checklist-text {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .checklist-progress {
            background: var(--bg-secondary);
            border-radius: 10px;
            height: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .checklist-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--success), #81c784);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .checklist-progress-text {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-align: center;
        }

        .checklist-reset {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            width: 100%;
            margin-top: 16px;
            transition: var(--transition);
        }

        .checklist-reset:active {
            background: var(--bg-card-hover);
        }

        /* ============================================================
           ДИАГНОСТИКА
           ============================================================ */
        .diag-question {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .diag-question h3 {
            color: var(--text-primary);
            font-size: 16px;
            line-height: 1.5;
        }

        .diag-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .diag-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            cursor: pointer;
            color: var(--text-primary);
            font-size: 14px;
            text-align: left;
            transition: var(--transition);
        }

        .diag-btn:active {
            border-color: var(--accent);
            background: var(--bg-card-hover);
            transform: scale(0.98);
        }

        /* ============================================================
           УВЕДОМЛЕНИЯ
           ============================================================ */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            z-index: 200;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ============================================================
           АНИМАЦИИ
           ============================================================ */
        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* ============================================================
           ПУСТОЕ СОСТОЯНИЕ
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state .emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .empty-state p {
            font-size: 14px;
            line-height: 1.5;
        }

        /* ============================================================
           СКРОЛЛ
           ============================================================ */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* Быстрые действия */
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .quick-chip {
            background: var(--accent-glow);
            border: 1px solid rgba(79, 195, 247, 0.3);
            color: var(--accent);
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .quick-chip:active {
            background: rgba(79, 195, 247, 0.3);
        }

        /* Статистика */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            margin-top: 20px;
            padding-left: 4px;
        }
    </style>
</head>
<body>

<!-- ============================================================
     ШАПКА
     ============================================================ -->
<div class="header">
    <button class="back-btn" id="backBtn" onclick="goBack()">←</button>
    <h1>🚋 <span id="headerTitle">Помощник водителя</span></h1>
    <div class="header-subtitle" id="headerSubtitle">База знаний</div>
</div>

<!-- ============================================================
     КОНТЕНТ
     ============================================================ -->
<div class="content" id="content">

    <!-- ГЛАВНОЕ МЕНЮ -->
    <div class="screen active" id="screen-main">
        <div class="greeting-card fade-in">
            <div class="emoji">🚋</div>
            <h2 id="greetingText">Добрый день!</h2>
            <p>Помощник водителя трамвая</p>
        </div>

        <div class="menu-grid">
            <button class="menu-btn fade-in" onclick="showScreen('problems')" style="animation-delay:0.05s">
                <span class="icon">🔧</span>
                <span class="label">Неисправности<small>Диагностика и решения</small></span>
                <span class="arrow">›</span>
            </button>

            <button class="menu-btn fade-in" onclick="showScreen('fuses')" style="animation-delay:0.1s">
                <span class="icon">⚡</span>
                <span class="label">Предохранители<small>FU 1 — FU 42</small></span>
                <span class="arrow">›</span>
            </button>

            <button class="menu-btn fade-in" onclick="showScreen('instructions')" style="animation-delay:0.15s">
                <span class="icon">📋</span>
                <span class="label">Инструкции<small>Правила и чек-листы</small></span>
                <span class="arrow">›</span>
            </button>

            <button class="menu-btn fade-in" onclick="showScreen('search')" style="animation-delay:0.2s">
                <span class="icon">🔍</span>
                <span class="label">Поиск по базе<small>Умный поиск по всем разделам</small></span>
                <span class="arrow">›</span>
            </button>

            <button class="menu-btn fade-in" onclick="showScreen('t811')" style="animation-delay:0.25s">
                <span class="icon">🚃</span>
                <span class="label">Т811<small>В разработке</small></span>
                <span class="arrow">›</span>
            </button>
        </div>
    </div>

    <!-- НЕИСПРАВНОСТИ -->
    <div class="screen" id="screen-problems">
        <div class="menu-grid fade-in">
            <button class="menu-btn" onclick="showScreen('diagnostic')">
                <span class="icon">🔍</span>
                <span class="label">Интерактивная диагностика<small>Пошаговый поиск неисправности</small></span>
                <span class="arrow">›</span>
            </button>
            <button class="menu-btn" onclick="showScreen('problem-search')">
                <span class="icon">✏️</span>
                <span class="label">Описать проблему текстом<small>Свободный поиск</small></span>
                <span class="arrow">›</span>
            </button>
        </div>

        <div class="section-title">Частые проблемы</div>
        <div class="quick-actions" id="quickProblems"></div>
    </div>

    <!-- ПОИСК НЕИСПРАВНОСТЕЙ -->
    <div class="screen" id="screen-problem-search">
        <div class="search-box fade-in">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="problemSearchInput"
                   placeholder="Опишите неисправность..."
                   oninput="searchProblems(this.value)">
            <button class="search-clear" id="problemClearBtn" onclick="clearSearch('problem')">✕</button>
        </div>
        <div id="problemResults"></div>
    </div>

    <!-- ПРЕДОХРАНИТЕЛИ -->
    <div class="screen" id="screen-fuses">
        <div class="search-box fade-in">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="fuseSearchInput"
                   placeholder="Номер или описание (напр: 25 или дверь)"
                   oninput="searchFuses(this.value)">
            <button class="search-clear" id="fuseClearBtn" onclick="clearSearch('fuse')">✕</button>
        </div>
        <div id="fuseResults">
            <div class="fuse-list" id="fuseList"></div>
        </div>
    </div>

    <!-- ИНСТРУКЦИИ -->
    <div class="screen" id="screen-instructions">
        <div class="menu-grid fade-in">
            <button class="menu-btn" onclick="showScreen('checklist')">
                <span class="icon">✅</span>
                <span class="label">Проверка вагона перед выездом<small>Интерактивный чек-лист</small></span>
                <span class="arrow">›</span>
            </button>
            <button class="menu-btn" onclick="showInstruction('speed')">
                <span class="icon">🚦</span>
                <span class="label">Ограничения скорости<small>Все ограничения</small></span>
                <span class="arrow">›</span>
            </button>
            <button class="menu-btn" onclick="showInstruction('distance')">
                <span class="icon">📏</span>
                <span class="label">Дистанция<small>Безопасные расстояния</small></span>
                <span class="arrow">›</span>
            </button>
            <button class="menu-btn" onclick="showInstruction('brake')">
                <span class="icon">🛑</span>
                <span class="label">Проверка мех. тормоза<small>Порядок проверки</small></span>
                <span class="arrow">›</span>
            </button>
        </div>
    </div>

    <!-- ЧЕК-ЛИСТ -->
    <div class="screen" id="screen-checklist">
        <div class="answer-card fade-in">
            <div class="checklist-progress-text" id="checklistProgressText">0 из 0 выполнено</div>
            <div class="checklist-progress">
                <div class="checklist-progress-bar" id="checklistProgressBar" style="width: 0%"></div>
            </div>
            <div id="checklistContent"></div>
            <button class="checklist-reset" onclick="resetChecklist()">🔄 Сбросить чек-лист</button>
        </div>
    </div>

    <!-- ПРОСМОТР ИНСТРУКЦИИ -->
    <div class="screen" id="screen-instruction-view">
        <div class="answer-card fade-in" id="instructionContent"></div>
    </div>

    <!-- ПОИСК ПО ВСЕЙ БАЗЕ -->
    <div class="screen" id="screen-search">
        <div class="search-box fade-in">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="globalSearchInput"
                   placeholder="Поиск по всей базе знаний..."
                   oninput="searchAll(this.value)">
            <button class="search-clear" id="globalClearBtn" onclick="clearSearch('global')">✕</button>

// ============================================================
function expandWithSynonyms(words) {
    const expanded = new Set(words);
    words.forEach(word => {
        if (SYNONYMS[word]) {
            SYNONYMS[word].forEach(syn => expanded.add(syn));
        }
    });
    return expanded;
}

function getWords(text) {
    return text.toLowerCase()
        .replace(/[^a-zа-яё0-9 ]/g, ' ')
        .split(/\s+/)
        .filter(w => w.length > 1);
}

function stringSimilarity(s1, s2) {
    if (s1 === s2) return 1;
    if (s1.length < 2 || s2.length < 2) return 0;

    let matches = 0;
    const s2arr = s2.split('');
    for (const char of s1) {
        const idx = s2arr.indexOf(char);
        if (idx !== -1) {
            matches++;
            s2arr.splice(idx, 1);
        }
    }
    return (2 * matches) / (s1.length + s2.length);
}

function calculateScore(queryText, item, category) {
    const words = getWords(queryText);
    const expanded = expandWithSynonyms(words);
    const keywords = new Set(item.keywords || []);
    const allKeywords = expandWithSynonyms([...keywords]);
    const question = item.question.toLowerCase();

    let score = 0;

    expanded.forEach(word => {
        if (allKeywords.has(word)) {
            score += KEYWORD_WEIGHTS[word] || 1;
        } else if (question.includes(word)) {
            score += 2;
        }
    });

    if (score === 0) {
        words.forEach(word => {
            let bestScore = 0;
            allKeywords.forEach(kw => {
                const sim = stringSimilarity(word, kw);
                if (sim >= 0.75 && sim > bestScore) {
                    const weight = KEYWORD_WEIGHTS[kw] || 1;
                    score += weight * sim;
                    bestScore = sim;
                }
            });
        });
    }

    if (category && item.category === category) {
        score += 2;
    }

    return score;
}

function searchInBase(query, category) {
    const queryLower = query.toLowerCase().trim();
    if (queryLower.length < 2) return [];

    let items = KNOWLEDGE_BASE;
    if (category) {
        items = items.filter(i => i.category === category);
    }

    // FU search
    const fuMatch = queryLower.match(/(fu|фу)?\s*(\d+[aа]?)/i);
    if (fuMatch) {
        const fuNum = fuMatch[2].toLowerCase().replace('а', 'a');
        const fuResults = items.filter(i =>
            i.keywords.includes(fuNum) &&
            i.question.toLowerCase().startsWith('fu')
        );
        if (fuResults.length > 0) {
            return fuResults.map(item => ({item, score: 100}));
        }
    }

    const results = [];
    items.forEach(item => {
        const score = calculateScore(query, item);
        if (score > 0) {
            results.push({item, score});
        }
    });

    results.sort((a, b) => b.score - a.score);
    return results;
}

// ============================================================
// ОТОБРАЖЕНИЕ РЕЗУЛЬТАТОВ
// ============================================================
const CATEGORY_NAMES = {
    fuse: 'Предохранители',
    problem: 'Неисправности',
    instruction: 'Инструкции',
    t811: 'Т811'
};

const CATEGORY_CLASSES = {
    fuse: 'cat-fuse',
    problem: 'cat-problem',
    instruction: 'cat-instruction',
    t811: 'cat-t811'
};

function renderResults(results, containerId) {
    const container = document.getElementById(containerId);
    if (!results.length) {
        container.innerHTML = `
            <div class="empty-state">
                <div class="emoji">🔍</div>
                <p>Ничего не найдено.<br>Попробуйте другие слова.</p>
            </div>`;
        return;
    }

    const display = results.slice(0, 10);
    container.innerHTML = `<div class="results-count">Найдено: ${results.length}</div>` +
        display.map(r => `
            <div class="result-card" onclick="showAnswer(${r.item.id})">
                <div class="result-header">
                    <span class="result-cat ${CATEGORY_CLASSES[r.item.category] || ''}">${CATEGORY_NAMES[r.item.category] || ''}</span>
                    <span class="result-question">${r.item.question}</span>
                </div>
            </div>
        `).join('');
}

// ============================================================
// ПОКАЗ ОТВЕТА
// ============================================================
function showAnswer(id) {
    const item = KNOWLEDGE_BASE.find(q => q.id === id);
    if (!item) return;

    const answerHtml = item.answer
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/(FU\s*\d+[AАaа]?)/g, '<strong>$1</strong>');

    document.getElementById('answerContent').innerHTML = `
        <span class="result-cat ${CATEGORY_CLASSES[item.category] || ''}" style="margin-bottom:12px;display:inline-block">
            ${CATEGORY_NAMES[item.category] || ''}
        </span>
        <h3>${item.question}</h3>
        <div class="answer-text" style="margin-top:16px">${answerHtml}</div>
    `;

    // Similar results
    const similar = searchInBase(item.question, null)
        .filter(r => r.item.id !== id && r.score >= 2)
        .slice(0, 3);

    const simContainer = document.getElementById('similarResults');
    if (similar.length > 0) {
        simContainer.innerHTML = `
            <div class="section-title">Похожие вопросы</div>
            ${similar.map(r => `
                <div class="result-card" onclick="showAnswer(${r.item.id})">
                    <div class="result-header">
                        <span class="result-cat ${CATEGORY_CLASSES[r.item.category] || ''}">${CATEGORY_NAMES[r.item.category] || ''}</span>
                        <span class="result-question">${r.item.question}</span>
                    </div>
                </div>
            `).join('')}
        `;
    } else {
        simContainer.innerHTML = '';
    }

    showScreen('answer');

    // Stats
    searchStats.total++;
    localStorage.setItem('search_stats', JSON.stringify(searchStats));
}

// ============================================================
// ПОИСК — ОБРАБОТЧИКИ
// ============================================================
let searchTimeout;

function searchAll(query) {
    clearTimeout(searchTimeout);
    const clearBtn = document.getElementById('globalClearBtn');
    clearBtn.classList.toggle('visible', query.length > 0);
    document.getElementById('searchQuickActions').style.display = query.length > 0 ? 'none' : 'flex';

    if (query.length < 2) {
        document.getElementById('globalResults').innerHTML = '';
        return;
    }

    searchTimeout = setTimeout(() => {
        const results = searchInBase(query, null);
        renderResults(results, 'globalResults');
    }, 200);
}

function searchProblems(query) {
    clearTimeout(searchTimeout);
    document.getElementById('problemClearBtn').classList.toggle('visible', query.length > 0);

    if (query.length < 2) {
        document.getElementById('problemResults').innerHTML = '';
        return;
    }

    searchTimeout = setTimeout(() => {
        const results = searchInBase(query, 'problem');
        renderResults(results, 'problemResults');
    }, 200);
}

function searchFuses(query) {
    clearTimeout(searchTimeout);
    document.getElementById('fuseClearBtn').classList.toggle('visible', query.length > 0);

    if (query.length < 2) {
        renderFuseList();
        return;
    }

    searchTimeout = setTimeout(() => {
        const results = searchInBase(query, 'fuse');
        if (results.length > 0) {
            renderResults(results, 'fuseResults');
        } else {
            // Search in fuse list too
            const queryLower = query.toLowerCase();
            const filtered = FUSE_LIST.filter(f =>
                f.num.toLowerCase().includes(queryLower) ||
                f.desc.toLowerCase().includes(queryLower)
            );
            renderFilteredFuseList(filtered);
        }
    }, 200);
}

function clearSearch(type) {
    if (type === 'global') {
        document.getElementById('globalSearchInput').value = '';
        document.getElementById('globalResults').innerHTML = '';
        document.getElementById('globalClearBtn').classList.remove('visible');
        document.getElementById('searchQuickActions').style.display = 'flex';
    } else if (type === 'problem') {
        document.getElementById('problemSearchInput').value = '';
        document.getElementById('problemResults').innerHTML = '';
        document.getElementById('problemClearBtn').classList.remove('visible');
    } else if (type === 'fuse') {
        document.getElementById('fuseSearchInput').value = '';
        document.getElementById('fuseClearBtn').classList.remove('visible');
        renderFuseList();
    }
}

function quickSearch(query) {
    document.getElementById('globalSearchInput').value = query;
    searchAll(query);
}

// ============================================================
// ПРЕДОХРАНИТЕЛИ — СПИСОК
// ============================================================
function renderFuseList() {
    renderFilteredFuseList(FUSE_LIST);
}

function renderFilteredFuseList(list) {
    const container = document.getElementById('fuseResults');
    if (list.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>Предохранитель не найден</p></div>';
        return;
    }
    container.innerHTML = `<div class="fuse-list">${list.map(f => `
        <div class="fuse-item" onclick="showFuseDetail('${f.num}')">
            <span class="fuse-num">FU ${f.num}</span>
            <span class="fuse-desc">${f.desc}</span>
        </div>
    `).join('')}</div>`;
}

function showFuseDetail(num) {
    const results = searchInBase('FU ' + num, 'fuse');
    if (results.length > 0) {
        showAnswer(results[0].item.id);
    }
}

// ============================================================
// ИНСТРУКЦИИ
// ============================================================
function showInstruction(type) {
    const queries = {
        speed: {q: 'ограничения скорости', id: 2},
        distance: {q: 'дистанция соблюдать', id: 3},
        brake: {q: 'проверка механический тормоз', id: 1}
    };

    const info = queries[type];
    if (info) {
        showAnswer(info.id);
    }
}

// ============================================================
// ЧЕК-ЛИСТ
// ============================================================
function renderChecklist() {
    const container = document.getElementById('checklistContent');
    let totalItems = 0;
    let checkedCount = 0;

    let html = '';
    CHECKLIST.sections.forEach((section, si) => {
        html += `<div class="checklist-section"><h4>${section.title}</h4>`;
        section.items.forEach((item, ii) => {
            const key = `${si}_${ii}`;
            const isChecked = checkedItems[key];
            totalItems++;
            if (isChecked) checkedCount++;

            html += `
                <div class="checklist-item ${isChecked ? 'checked-item' : ''}" onclick="toggleCheckItem('${key}')">
                    <div class="checklist-checkbox ${isChecked ? 'checked' : ''}"></div>
                    <span class="checklist-text">${item}</span>
                </div>`;
        });
        html += '</div>';
    });

    container.innerHTML = html;

    const pct = totalItems > 0 ? Math.round((checkedCount / totalItems) * 100) : 0;
    document.getElementById('checklistProgressBar').style.width = pct + '%';
    document.getElementById('checklistProgressText').textContent = `${checkedCount} из ${totalItems} выполнено (${pct}%)`;
}

function toggleCheckItem(key) {
    checkedItems[key] = !checkedItems[key];
    localStorage.setItem('checklist_checked', JSON.stringify(checkedItems));
    renderChecklist();

    if (navigator.vibrate) navigator.vibrate(30);
}

function resetChecklist() {
    checkedItems = {};
    localStorage.setItem('checklist_checked', '{}');
    renderChecklist();
    showToast('Чек-лист сброшен');
}

// ============================================================
// ДИАГНОСТИКА
// ============================================================
function renderDiagnostic(nodeId) {
    const node = DIAGNOSTIC_TREE[nodeId];
    if (!node) return;

    const container = document.getElementById('diagnosticContent');

    if (node.action === 'enable_text_search') {
        showScreen('problem-search');
        return;
    }

    let html = `
        <div class="diag-question fade-in">
            <h3>${node.text}</h3>
        </div>
        <div class="diag-options fade-in">`;

    node.options.forEach(opt => {
        if (opt.next) {
            html += `<button class="diag-btn" onclick="renderDiagnostic('${opt.next}')">${opt.text}</button>`;
        } else if (opt.answer !== undefined) {
            html += `<button class="diag-btn" onclick="showAnswer(${opt.answer})">${opt.text}</button>`;
        }
    });

    if (nodeId !== 'root') {
        html += `<button class="diag-btn" onclick="renderDiagnostic('root')" style="border-color:var(--accent);color:var(--accent)">↩ К началу диагностики</button>`;
    }

    html += '</div>';
    container.innerHTML = html;
}

// БЫСТРЫЕ ПРОБЛЕМЫ
// ============================================================

        {text: "Не включается в режим хода", query: "не включается режим хода"},

function quickProblemSearch(query) {
    showScreen('problem-search');
    setTimeout(() => {
        document.getElementById('problemSearchInput').value = query;
        searchProblems(query);
    }, 100);
}

// ============================================================
// УВЕДОМЛЕНИЯ
// ============================================================
function showToast(message) {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// ============================================================
// ПРИВЕТСТВИЕ
// ============================================================
function setGreeting() {
    const hour = new Date().getHours();
    let greeting;
    if (hour >= 5 && hour < 12) greeting = 'Доброе утро! ☀️';
    else if (hour >= 12 && hour < 18) greeting = 'Добрый день! 🌤';
    else if (hour >= 18 && hour < 23) greeting = 'Добрый вечер! 🌆';
    else greeting = 'Доброй ночи! 🌙';

    document.getElementById('greetingText').textContent = greeting;
}

// ИНИЦИАЛИЗАЦИЯ
// ============================================================
setGreeting();
showScreen('main');
